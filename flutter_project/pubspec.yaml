name: video_summarizer
description: "多模态智能视频总结移动应用 - Flutter版本"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 导航和路由
  go_router: ^14.1.0
  
  # 状态管理
  provider: ^6.1.5+1

  # HTTP请求
  http: ^1.2.0
  
  # 本地存储
  shared_preferences: ^2.2.0
  
  # 文件选择
  file_picker: ^8.0.0
  
  # 视频处理相关
  video_player: ^2.8.0
  
  # 进度显示
  percent_indicator: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

